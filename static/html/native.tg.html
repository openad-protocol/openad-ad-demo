<!DOCTYPE html>
<html lang="en">
<head>
    <title>This page is a demo for native mode to load OpenAd ad!</title>
    <meta name="author" content="OpenAD Protocol">
    <meta name="keywords" content="ad, ads, advertising, openad, openad protocol, openad network" />
    <meta name="description" content="A revolution on behalf of the Web3 Advertising Ecosystem." />
    <meta charset="utf-8">
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="apple-touch-fullscreen" content="yes">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black">
    <meta http-equiv="Cache-Control" content="no-transform"/>
    <meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate" />
    <meta http-equiv="Pragma" content="no-cache" />
    <meta http-equiv="Expires" content="0" />
    <meta name="format-detection" content="telephone=no">
    <meta name="layoutmode" content="standard">
    <meta name="wap-font-scale" content="no">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, minimum-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover"/>
    <meta name="screen-orientation" content="portrait">
    <meta name="x5-orientation" content="portrait">
    <meta name="renderer" content="webkit|ie-comp">
    <link rel="icon" href="https://openad.network/static/favicon.ico">
    <link href="https://openad.network/static/css/common.css?t=v2" rel="stylesheet" type="text/css" />
    <script type="text/javascript" name="telegramJS" src="https://telegram.org/js/telegram-web-app.js"></script>
	<script type="text/javascript" version="3.0" src="https://protocol.openad.network/sdkloader.js?v=3.0"></script>
    <!--this style you should modify by yourself-->
    <style type="text/css">
        .openADJsSDKBanner { height:100%; width:100%; }
    </style>
</head>
<body>
<div id="app">
    <!--openAD codes below-->
    <div class="openADJsSDKBanner MFlex TGAD" zoneId="56" publisherId="49"></div>
    <!--openAD codes above-->
</div>
<!--openAD script below-->
<script type="text/javascript">
    window.addEventListener('load',  function() {
		window.openAdNative = {
			// Create a params object
			adParams: {
			  version: 'your-app-version', // your app version , If there is no data, please leave it blank
			  TG: { type: 'telegram', FN: window.Telegram },
			  //If you've loaded `https://telegram.org/js/telegram-web-app.js` in your TMA
			  //TG = { type: 'telegram', FN: window.Telegram };
			  //If you're using `@telegram-apps/sdk` in your TMA
			  //import { initUtils } from '@telegram-apps/sdk';
			  //TG = { type: '@telegram-apps/sdk', FN: initUtils() }
			  //If you haven't loaded any Telegram SDK
			  //TG = { type: 'noSDK', FN: null }
			},
			adInfo: {
				zoneId: 56, // int,  This is an example zoneId, please get your own code parameters
				publisherId: 49, // int, This is an example publisherId, please get your own code parameters
			},
			// Call SDK method to get advertising data
			getAD: function(){
				window.openADJsSDK.bridge.init({ adParams: this.adParams, adInfo: this.adInfo });
			},
			// Close AD
			destroy: function(adInfo){
			  document.querySelector(`.openADJsSDKBanner[zoneId="${adInfo.zoneId}"][publisherId="${adInfo.publisherId}"]`).innerHTML = '';
			}
		};
		window.openAdNative.getAD();
		//window.openAdNative.destroy(window.openAdNative.adInfo);
	});
</script>
<!--openAD script above-->
</body>
</html>
